repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.11.11
    hooks:
      # Run the linter.
      - id: ruff-check
        types_or: [python, pyi]
        args: [--fix]
      # Run the formatter.
      - id: ruff-format
        types_or: [python, pyi]
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.34.1
    hooks:
      - id: check-jsonschema
        files: ^submission/.*\.hfx-metadata\.json$
        args: ["--verbose","--schemafile", "https://raw.githubusercontent.com/nmdp-bioinformatics/hfx/refs/heads/main/hfx.schema.json"]
